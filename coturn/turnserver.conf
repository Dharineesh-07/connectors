# coturn TURN server for native-WebRTC audio/video calls.
#
# The Go backend mints time-limited TURN credentials with the shared secret
# below (TURN_SECRET in backend-go/.env MUST equal static-auth-secret), and the
# browser fetches them from GET /api/calls/ice-servers. TURN is the fallback
# relay used when a direct browser↔SFU path can't be established.

listening-port=3478
fingerprint
use-auth-secret
static-auth-secret=devturnsecret_change_me_min_32_characters
realm=orgchat

# Relay port range — published to the host in docker-compose so relayed media
# can reach the browser.
min-port=49152
max-port=49200

# Local dev: no TLS, no admin CLI.
no-tls
no-dtls
no-cli

no-multicast-peers

# NOTE: this dev config does not restrict relay peers. For production, lock down
# with allowed-peer-ip / denied-peer-ip and enable TLS (turns:).

log-file=stdout
simple-log
