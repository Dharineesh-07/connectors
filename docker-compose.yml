# Run with: docker compose --env-file ./backend-go/.env up -d
# Copy backend-go/.env.example to backend-go/.env and fill in values before first run.

networks:
  orgchat-net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rootpassword}
      POSTGRES_DB: orgchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - orgchat-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - orgchat-net

  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: host=postgres port=5432 user=postgres password=${POSTGRES_PASSWORD:-rootpassword} dbname=orgchat sslmode=disable TimeZone=UTC
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      COMPANY_EMAIL_DOMAIN: ${COMPANY_EMAIL_DOMAIN:-cnc.com}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      UPLOADS_DIR: /app/uploads
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      TURN_SERVER_URL: ${TURN_SERVER_URL:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:8081,http://localhost:19006,http://192.168.0.161:8081,http://192.168.29.4,http://192.168.29.4:80,http://192.168.29.4:5173,http://192.168.29.4:8081,http://192.168.29.4:19006}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s
    networks:
      - orgchat-net

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_BACKEND_URL: http://backend:8000
      VITE_BACKEND_WS_URL: ws://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "80:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - orgchat-net

volumes:
  postgres_data:
  redis_data:
  uploads_data:
