# Only Redis runs in Docker. Postgres, the Go backend, and the frontend all run
# natively on the host (see README for the dev workflow).
#
#   docker compose up -d      # start Redis (localhost:6379)
#   docker compose down       # stop it
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  redis_data:
