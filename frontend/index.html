<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#CC3333" />
    <meta name="application-name" content="COMPUNET connections" />
    <meta name="description" content="COMPUNET connections — Internal Communication Platform" />
    <title>COMPUNET connections</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('orgchat-theme')
          var theme = stored === 'dark' || stored === 'light'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'

          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = theme
        } catch (error) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
